{% extends "base.html" %}
{% block title %}Users — Dotmac Academy{% endblock %}
{% block content %}
<h1 class="text-xl font-semibold">Users</h1>

<ul class="mt-3 space-y-1" id="user-list">
  {% for u in users %}
  <li class="border rounded p-3">
    <span class="font-medium">{{ u.email }}</span>
    <span class="text-xs ml-2 bg-slate-100 px-2 py-0.5 rounded">{{ u.slug }}</span>
  </li>
  {% else %}
  <li class="text-slate-500 italic">No users yet.</li>
  {% endfor %}
</ul>

<h2 class="mt-6 text-lg font-semibold">Create account</h2>
<!-- htmx form so the global CSRF injector (base.html) applies the x-csrf-token header. -->
<form class="mt-2 grid grid-cols-2 gap-2 max-w-xl"
      hx-post="/instructor/users"
      hx-target="body"
      hx-push-url="true">
  <input name="first_name" type="text" placeholder="First name"
         class="border rounded px-2 py-1" required>
  <input name="last_name" type="text" placeholder="Last name"
         class="border rounded px-2 py-1" required>
  <input name="email" type="email" placeholder="user@example.com"
         class="border rounded px-2 py-1 col-span-2" required>
  <input name="password" type="password" placeholder="Password"
         class="border rounded px-2 py-1 col-span-2" required>
  <select name="role" class="border rounded px-2 py-1 col-span-2">
    <option value="student">Student</option>
    {% if is_admin %}
    <option value="instructor">Instructor</option>
    <option value="admin">Administrator</option>
    {% endif %}
  </select>
  <button type="submit"
          class="bg-slate-900 text-white px-3 py-2 rounded col-span-2">Create account</button>
</form>
{% endblock %}
