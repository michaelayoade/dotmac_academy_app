<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ branding_name | default("Dotmac Academy") }}{% endblock %}</title>

  <!-- Brand type: Fraunces (display) + Manrope (UI/body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,560;9..144,600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Compiled Tailwind v3 build + custom base layer (npm run build:css) -->
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body class="min-h-screen bg-sand-100 text-ink antialiased">

  <header class="sticky top-0 z-30 border-b border-sand-300/80 bg-sand-50/85 backdrop-blur supports-[backdrop-filter]:bg-sand-50/70">
    <div class="mx-auto flex max-w-5xl items-center justify-between gap-6 px-6 py-3.5">
      <a href="/" class="group flex items-center gap-2.5" aria-label="{{ branding_name | default('Dotmac Academy') }} home">
        <!-- Abstract emerald fiber/node emblem -->
        <svg viewBox="0 0 32 32" class="h-8 w-8 shrink-0" fill="none" aria-hidden="true">
          <g class="stroke-brand-600" stroke-width="1.7" stroke-linecap="round">
            <path d="M16 16 L6 6.5"/>
            <path d="M16 16 L26 9"/>
            <path d="M16 16 L24.5 25"/>
            <path d="M16 16 L7.5 25.5"/>
          </g>
          <circle cx="6" cy="6.5" r="2.3" class="fill-brand-500"/>
          <circle cx="26" cy="9" r="2.3" class="fill-clay-500"/>
          <circle cx="24.5" cy="25" r="2.3" class="fill-brand-500"/>
          <circle cx="7.5" cy="25.5" r="2.3" class="fill-brand-500"/>
          <circle cx="16" cy="16" r="4.4" class="fill-brand-700"/>
          <circle cx="16" cy="16" r="1.7" class="fill-sand-50"/>
        </svg>
        <span class="font-display text-lg font-[560] tracking-tight text-ink">
          {{ branding_name | default("Dotmac Academy") }}
        </span>
      </a>

      <nav class="flex items-center gap-1 text-sm font-medium">
        {% if request.cookies.get('session') %}
        <a href="/" class="rounded-lg px-3 py-1.5 text-ink-soft transition-colors hover:bg-sand-200 hover:text-brand-700">Dashboard</a>
        <a href="/progress" class="rounded-lg px-3 py-1.5 text-ink-soft transition-colors hover:bg-sand-200 hover:text-brand-700">Progress</a>
        <form hx-post="/logout" hx-swap="none" class="ml-1 inline">
          <button type="submit" class="rounded-lg border border-sand-300 px-3 py-1.5 text-ink-soft transition-colors hover:border-brand-400 hover:text-brand-700">Log out</button>
        </form>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-3xl px-6 py-10 sm:py-12">
    {% block content %}{% endblock %}
  </main>

  <footer class="mx-auto max-w-3xl px-6 pb-10 pt-4">
    <p class="text-xs text-ink-soft/80">{{ branding_name | default("Dotmac Academy") }} — learn the network, hands on.</p>
  </footer>

  <script>
    document.body.addEventListener('htmx:configRequest', function (evt) {
      var m = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]+)/);
      if (m) { evt.detail.headers['x-csrf-token'] = m[1]; }
    });
  </script>
</body>
</html>
