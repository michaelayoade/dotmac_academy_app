{% extends "base.html" %}{% block content %}
<p class="font-sans text-sm font-semibold uppercase tracking-[0.16em] text-brand-600">Chapter test</p>
<h1 class="mt-1.5 text-2xl tracking-tight">{{ activity.title }}</h1>
<form hx-post="/activities/{{ activity.id }}/submit" hx-target="#result" hx-swap="innerHTML" class="mt-8 space-y-5">
  {% for q in questions %}
  <fieldset class="card p-5">
    <legend class="px-1 font-display text-lg text-ink">{{ q.stem }}</legend>
    <div class="mt-3 space-y-2">
    {% for opt in q.options %}
    <label class="flex cursor-pointer items-center gap-2.5 rounded-lg px-2 py-1.5 transition-colors hover:bg-sand-200">
      <input type="{{ 'checkbox' if q.type == 'multi' else 'radio' }}" name="{{ q.ext_id }}" value="{{ opt }}" class="h-4 w-4 accent-[oklch(0.44_0.10_161)]">
      <span class="text-ink">{{ opt }}</span>
    </label>
    {% endfor %}
    </div>
  </fieldset>
  {% endfor %}
  <button class="btn-primary" type="submit">Submit answers</button>
</form>
<div id="result" class="mt-6"></div>
{% endblock %}
