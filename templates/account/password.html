{% extends "base.html" %}
{% block title %}Change password — {{ branding_name | default("Dotmac Academy") }}{% endblock %}
{% block content %}
<p class="font-sans text-sm font-semibold uppercase tracking-[0.16em] text-brand-600">Account</p>
<h1 class="mt-1.5 text-3xl tracking-tight">Change password</h1>
<p class="mt-2 text-ink-soft">Enter your current password, then choose a new one (at least 8 characters).</p>

<form hx-post="/account/password" hx-target="#password-flash" hx-swap="innerHTML" class="mt-10 space-y-6">
  <section class="card p-6">
    <div class="space-y-4">
      <div>
        <label for="current_password" class="mb-1.5 block text-sm font-semibold text-ink">Current password</label>
        <input id="current_password" type="password" name="current_password" autocomplete="current-password"
               class="w-full px-3.5 py-2.5 text-[0.95rem]">
      </div>
      <div>
        <label for="new_password" class="mb-1.5 block text-sm font-semibold text-ink">New password</label>
        <input id="new_password" type="password" name="new_password" autocomplete="new-password"
               class="w-full px-3.5 py-2.5 text-[0.95rem]">
      </div>
      <div>
        <label for="confirm_password" class="mb-1.5 block text-sm font-semibold text-ink">Confirm new password</label>
        <input id="confirm_password" type="password" name="confirm_password" autocomplete="new-password"
               class="w-full px-3.5 py-2.5 text-[0.95rem]">
      </div>
    </div>
  </section>

  <div class="flex items-center gap-3">
    <button type="submit" class="btn-primary">Update password</button>
    <span id="password-flash"></span>
  </div>
</form>

<p class="mt-6">
  <a class="btn-ghost" href="/account">Back to profile</a>
</p>
{% endblock %}
