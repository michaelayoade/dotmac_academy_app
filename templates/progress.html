{% extends "base.html" %}{% block content %}
<p class="font-sans text-sm font-semibold uppercase tracking-[0.16em] text-brand-600">Track record</p>
<h1 class="mt-1.5 text-3xl tracking-tight">Your progress</h1>

<div class="card mt-8 overflow-hidden">
  <table class="w-full text-sm">
    <thead>
      <tr class="border-b border-sand-300 bg-sand-200/60 text-left text-xs uppercase tracking-wider text-ink-soft">
        <th class="p-3.5 font-semibold">Score</th>
        <th class="p-3.5 font-semibold">Result</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-sand-200">
      {% for s in best %}
      <tr class="transition-colors hover:bg-sand-100">
        <td class="p-3.5 font-mono tabular-nums text-ink">{{ s.score }}/{{ s.max_score }}</td>
        <td class="p-3.5">
          {% if s.passed %}
          <span class="inline-flex items-center rounded-full bg-brand-100 px-2.5 py-0.5 text-xs font-semibold text-brand-800">Pass</span>
          {% else %}
          <span class="inline-flex items-center rounded-full bg-clay-500/15 px-2.5 py-0.5 text-xs font-semibold text-clay-600">Fail</span>
          {% endif %}
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
