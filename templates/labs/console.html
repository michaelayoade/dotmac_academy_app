<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ node }} console — Dotmac Academy</title>
  <link rel="stylesheet" href="/static/app.css?v=3">
</head>
<body class="flex h-screen flex-col overflow-hidden bg-ink antialiased">
  <header class="flex shrink-0 items-center justify-between gap-3 border-b border-sand-300 bg-sand-100 px-4 py-2">
    <div class="flex min-w-0 items-center gap-2.5">
      <span class="h-2 w-2 shrink-0 rounded-full bg-brand-600"></span>
      <span class="text-xs font-semibold uppercase tracking-[0.16em] text-ink-soft">Console</span>
      <span class="truncate font-mono text-sm text-ink">{{ node }}</span>
    </div>
    <a class="btn-ghost shrink-0 px-3 py-1.5 text-sm" href="/labs/{{ activity_id }}">&larr; Back to lab</a>
  </header>
  <iframe src="/labs/instances/{{ instance.id }}/console/{{ node }}"
          title="{{ node }} terminal"
          class="min-h-0 w-full flex-1 border-0 bg-black"></iframe>
</body>
</html>
