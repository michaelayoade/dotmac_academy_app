{% extends "base.html" %}{% block content %}
<p class="font-sans text-sm font-semibold uppercase tracking-[0.16em] text-brand-600">Hands-on lab</p>
<h1 class="mt-1.5 text-3xl tracking-tight">{{ template.title }}</h1>

<div class="mt-8 lg:grid lg:grid-cols-3 lg:items-start lg:gap-10">
  <!-- Control panel — sticky beside the instructions on large screens, on top on small. -->
  <aside class="lg:order-2 lg:col-span-1 lg:sticky lg:top-24 lg:self-start">
    <p class="font-sans text-xs font-semibold uppercase tracking-[0.16em] text-ink-soft">Lab controls</p>
    <div id="lab-state" class="mt-3">
    {% if instance %}
      {% include "labs/_status.html" %}
    {% else %}
      <div class="card p-6">
        <form hx-post="/labs/{{ activity.id }}/launch" hx-target="#lab-state" hx-swap="innerHTML">
          <button class="btn-primary w-full" type="submit">Launch lab</button>
          <p class="mt-3 text-sm text-ink-soft">Your environment spins up in its own sandbox — give it a few seconds.</p>
        </form>
      </div>
    {% endif %}
    </div>
  </aside>

  <!-- Instructions — main scrolling column. -->
  <article class="prose mt-8 lg:order-1 lg:col-span-2 lg:mt-0">{{ template.instructions_html | safe }}</article>
</div>
{% endblock %}
