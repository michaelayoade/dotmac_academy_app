<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apply — {{ branding_name | default("Dotmac Academy") }}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/app.css?v=2">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body class="min-h-screen bg-sand-100 text-ink antialiased">
  <section class="flex items-center justify-center px-6 py-12 sm:px-12">
    <div class="w-full max-w-md">
      <a href="/" class="mb-8 flex items-center gap-2.5" aria-label="{{ branding_name | default('Dotmac Academy') }}">
        <span class="font-display text-lg font-[560] tracking-tight">{{ branding_name | default("Dotmac Academy") }}</span>
      </a>

      <p class="font-sans text-sm font-semibold uppercase tracking-[0.16em] text-brand-600">Fiber Academy</p>
      <h1 class="mt-2 font-display text-3xl font-[560] tracking-tight text-ink">Apply to train with us</h1>
      <p class="mt-2 text-sm text-ink-soft">Field-grade fiber, routing and hands-on labs. Tell us who you are and we'll be in touch.</p>

      <div id="apply-result">
        <form hx-post="/apply" hx-target="#apply-result" hx-swap="outerHTML" class="mt-6 space-y-5">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label for="first_name" class="mb-1.5 block text-sm font-semibold text-ink">First name</label>
              <input id="first_name" name="first_name" type="text" required maxlength="80"
                     class="w-full px-3.5 py-2.5 text-[0.95rem]">
            </div>
            <div>
              <label for="last_name" class="mb-1.5 block text-sm font-semibold text-ink">Last name</label>
              <input id="last_name" name="last_name" type="text" required maxlength="80"
                     class="w-full px-3.5 py-2.5 text-[0.95rem]">
            </div>
          </div>
          <div>
            <label for="email" class="mb-1.5 block text-sm font-semibold text-ink">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required
                   placeholder="you@example.com" class="w-full px-3.5 py-2.5 text-[0.95rem]">
          </div>
          <div>
            <label for="phone" class="mb-1.5 block text-sm font-semibold text-ink">Phone <span class="font-normal text-ink-soft">(optional)</span></label>
            <input id="phone" name="phone" type="tel" maxlength="40"
                   class="w-full px-3.5 py-2.5 text-[0.95rem]">
          </div>
          <input type="hidden" name="program" value="Fiber Academy">
          <button type="submit" class="btn-primary w-full py-2.5 text-[0.95rem]">Submit application</button>
        </form>
      </div>
    </div>
  </section>

  <script>
    // Public form CSRF: copy the double-submit cookie into the header htmx sends
    // (same shim as login.html / base.html).
    document.body.addEventListener('htmx:configRequest', function (evt) {
      var m = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]+)/);
      if (m) { evt.detail.headers['x-csrf-token'] = m[1]; }
    });
  </script>
</body>
</html>
