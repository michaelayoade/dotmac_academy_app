{% if saved %}
<span class="inline-flex items-center gap-1.5 rounded-full bg-brand-100 px-2.5 py-0.5 text-xs font-semibold text-brand-800">&check; Settings saved</span>
<span class="ml-2 text-xs text-ink-soft">SMTP: {% if cfg.smtp_host %}{{ cfg.smtp_user or "no username" }} via {{ cfg.smtp_host }}:{{ cfg.smtp_port }}, from {{ cfg.smtp_from }}{% else %}not configured{% endif %}</span>
{% endif %}
