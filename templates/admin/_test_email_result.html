{% if sent %}
<span class="text-sm text-green-700">&check; Test email sent to {{ to }}</span>
{% elif unconfigured %}
<span class="text-sm text-red-700">&cross; SMTP is not configured — set an SMTP host above and save first.</span>
{% else %}
<span class="text-sm text-red-700">&cross; Test email not sent (send failed).</span>
{% endif %}
