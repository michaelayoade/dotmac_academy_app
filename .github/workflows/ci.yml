name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: academy_super
          POSTGRES_DB: academy
        ports:
          - 5437:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15

    env:
      MIGRATION_DATABASE_URL: postgresql+psycopg://postgres:academy_super@localhost:5437/academy
      TEST_DATABASE_URL: postgresql+psycopg://app_user:app_user@localhost:5437/academy
      # Some modules build their engine from DATABASE_URL at import time (before the
      # conftest fixture can patch it), so it must be present in the job env too.
      DATABASE_URL: postgresql+psycopg://app_user:app_user@localhost:5437/academy
      TEST_MIGRATION_DATABASE_URL: postgresql+psycopg://postgres:academy_super@localhost:5437/academy
      # Platform-scoped writes (e.g. admin settings) run as the platform_api role,
      # which holds INSERT/UPDATE on platform_settings; app_user is SELECT-only there.
      PLATFORM_DATABASE_URL: postgresql+psycopg://platform_api:platform_api@localhost:5437/academy
      PLATFORM_ROOT_DOMAIN: localhost

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Bootstrap DB roles
        env:
          PGPASSWORD: academy_super
        run: psql -h localhost -p 5437 -U postgres -d academy -v ON_ERROR_STOP=1 -f scripts/initdb-roles.sql

      - name: Run migrations
        run: poetry run alembic upgrade head

      - name: Lint (ruff)
        run: poetry run ruff check .

      - name: Type check (mypy)
        run: poetry run mypy

      - name: Tests
        run: poetry run pytest -q
