map $http_upgrade $connection_upgrade { default upgrade; '' close; }
map $http_accept $webp_suffix { default ""; "~image/webp" ".webp"; }

server {
    listen 80;
    listen [::]:80;
    server_name academy.dotmac.io *.academy.dotmac.io;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name academy.dotmac.io *.academy.dotmac.io;

    ssl_certificate     /etc/letsencrypt/live/academy.dotmac.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/academy.dotmac.io/privkey.pem;

    client_max_body_size 25m;

    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 512;
    gzip_types text/css application/javascript application/json image/svg+xml application/xml text/xml;

    location ~* ^/static/figures/.+\.png$ {
        root /home/dotmac/projects/dotmac_academy_app;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary Accept;
        try_files $uri$webp_suffix $uri =404;
    }
    location /static/ {
        root /home/dotmac/projects/dotmac_academy_app;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }
}
