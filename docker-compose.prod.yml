services:
  db:
    image: postgres:16
    container_name: academy-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_SUPER_PASSWORD}
      POSTGRES_DB: academy
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - academy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d academy"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  academy_pgdata:
